version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: stocksense_postgres
    environment:
      POSTGRES_USER: stocksense_admin
      POSTGRES_PASSWORD: supersecretpassword
      POSTGRES_DB: stocksense_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Kita langsung inject script inisialisasi database di bawah ini
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql

volumes:
  postgres_data:
